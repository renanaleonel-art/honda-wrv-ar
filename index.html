<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Teste WR-V AR</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
#splash {
  position: fixed; inset: 0; z-index: 100;
  background: #080C14;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  color: white;
}
#splash h1 { color: #E00000; font-size: 40px; }
#splash p { color: #888; }
#btn {
  background: #E00000; color: #fff; border: none;
  padding: 14px 44px; font-size: 16px; border-radius: 40px; cursor: pointer;
}
#status {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: white;
  padding: 8px 20px; border-radius: 20px; font-size: 12px;
  z-index: 10; display: none;
}
#status.on { display: block; }
#ar-scene { display: none; position: fixed; inset: 0; width: 100%; height: 100%; }
#ar-scene.active { display: block; }
</style>
</head>
<body>

<div id="splash">
  <h1>HONDA WR-V</h1>
  <p>Teste mínimo de AR</p>
  <button id="btn" onclick="startAR()">Abrir câmera</button>
</div>

<div id="status">Procurando catálogo...</div>

<a-scene id="ar-scene"
  mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-plane color="#00E5FF" position="0 0 0" width="0.3" height="0.3" material="opacity: 0.5"></a-plane>
  </a-entity>
</a-scene>

<script>
function startAR() {
  const scene = document.getElementById('ar-scene');
  scene.classList.add('active');
  document.getElementById('splash').style.display = 'none';
  document.getElementById('status').classList.add('on');

  scene.addEventListener('loaded', () => {
    const sys = scene.systems['mindar-image-system'];
    if (sys) sys.start();
  }, { once: true });

  setTimeout(() => {
    const sys = scene.systems['mindar-image-system'];
    if (sys && !sys.started) sys.start();
  }, 1500);

  document.getElementById('target').addEventListener('targetFound', () => {
    document.getElementById('status').textContent = '✅ RECONHECIDO!';
    document.getElementById('status').style.background = 'rgba(0,200,0,0.8)';
  });

  document.getElementById('target').addEventListener('targetLost', () => {
    document.getElementById('status').textContent = 'Procurando catálogo...';
    document.getElementById('status').style.background = 'rgba(0,0,0,0.7)';
  });
}
</script>
</body>
</html>
